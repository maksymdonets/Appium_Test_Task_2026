name: Android E2E

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  appium-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install dependencies
        run: npm ci

      - name: Restore managed Android cache
        uses: actions/cache@v4
        with:
          path: |
            .cache/android-sdk
            .cache/android-avd
            .cache/downloads
            .cache/apps
          key: managed-android-${{ runner.os }}-${{ hashFiles('package-lock.json', 'scripts/android-tooling.mjs', 'scripts/run-local.mjs', 'scripts/ensure-app.mjs') }}

      - name: Prepare managed Android environment
        run: npm run android:setup

      - name: Verify Android environment
        run: npm run doctor:android

      - name: Run Appium suite
        run: npm run test:ci

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-artifacts
          path: |
            artifacts/**
          if-no-files-found: ignore
